name: Java CI - Test

on:
  push:
  pull_request:
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: mvn -f inventario/inventario/pom.xml test
