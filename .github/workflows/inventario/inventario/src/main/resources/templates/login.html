<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body style="background-color: #fef6e4; font-family: Arial, sans-serif;">

<div style="max-width: 400px; margin: 50px auto; background-color: #fff; border: 2px solid #ff9f1c; padding: 20px; border-radius: 8px;">
    <h2 style="color: #ff9f1c; text-align: center;">Iniciar sesión</h2>

    <!-- Mensaje de error -->
    <div th:if="${param.error}" style="color: red; margin-bottom: 15px;">
        Usuario o contraseña incorrectos
    </div>

    <!-- Mensaje de registro exitoso -->
    <div th:if="${param.registered}" style="color: green; margin-bottom: 15px;">
        Registro exitoso. Ahora puedes iniciar sesión.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        
        <label for="username">Usuario:</label><br>
        <input type="text" id="username" name="username" required style="width: 100%; padding: 8px;"><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password" required style="width: 100%; padding: 8px;"><br><br>

        <button type="submit" style="background-color: #ff9f1c; color: white; border: none; padding: 10px 20px; border-radius: 4px; width: 100%;">Ingresar</button>
    </form>

    <div style="text-align: center; margin-top: 10px;">
        <a href="/register" style="color: #ff9f1c; text-decoration: none;">¿No tienes cuenta? Regístrate</a>
    </div>
</div>

</body>
</html>
