<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body style="background-color: #fef6e4; font-family: Arial, sans-serif;">

<div style="max-width: 500px; margin: 50px auto; background-color: #fff; border: 2px solid #ff9f1c; padding: 20px; border-radius: 8px;">
    <h2 style="color: #ff9f1c; text-align: center;">Registrarse</h2>

    <!-- Mensaje de error -->
    <div th:if="${error}" style="color: red; margin-bottom: 15px;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post" onsubmit="return validarFormulario()">
        <!-- Solo visual -->
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required style="width: 100%; padding: 8px;"><br><br>

        <label for="telefono">Teléfono:</label><br>
        <input type="tel" id="telefono" name="telefono" required style="width: 100%; padding: 8px;"><br><br>

        <label for="email">Correo electrónico:</label><br>
        <input type="email" th:field="*{email}" required style="width: 100%; padding: 8px;"><br><br>

        <label for="puesto">Puesto en la PyME:</label><br>
        <input type="text" id="puesto" name="puesto" required style="width: 100%; padding: 8px;"><br><br>

        <!-- Campos funcionales -->
        <label for="username">Usuario:</label><br>
        <input type="text" th:field="*{username}" required style="width: 100%; padding: 8px;"><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" th:field="*{password}" required style="width: 100%; padding: 8px;"><br><br>

        <label for="confirmar">Confirmar contraseña:</label><br>
        <input type="password" id="confirmar" required style="width: 100%; padding: 8px;"><br><br>

        <button type="submit" style="background-color: #ff9f1c; color: white; border: none; padding: 10px 20px; border-radius: 4px; width: 100%;">Registrarse</button>
    </form>

    <p style="text-align: center; margin-top: 15px;">
        ¿Ya tienes cuenta? <a href="/login" style="color: #ff9f1c;">Inicia sesión</a>
    </p>
</div>

<script>
function validarFormulario() {
    const pass = document.getElementById("password").value;
    const confirmar = document.getElementById("confirmar").value;

    if (pass !== confirmar) {
        alert("Las contraseñas no coinciden.");
        return false;
    }
    return true;
}
</script>

</body>
</html>
